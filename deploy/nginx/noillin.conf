server {
    server_name noillin.in www.noillin.in;

    client_max_body_size 25M;

    # =========================
    # NEXT.JS FRONTEND
    # =========================
    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # =========================
    # CORE API
    # =========================
    location /api/ {
        proxy_pass http://127.0.0.1:5000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================
    # SOCKET.IO
    # =========================
    location /socket.io/ {
        proxy_pass http://127.0.0.1:6001/socket.io/;

        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/noillin.in/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/noillin.in/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.noillin.in) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = noillin.in) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name noillin.in www.noillin.in;
    return 404; # managed by Certbot




}